<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stealth Web Proxy</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex flex-col font-sans">

    <div class="bg-yellow-600 text-white text-center py-2 px-4 text-sm font-semibold shadow-md">
        ⚠️ Aviso: Este proxy não oferece criptografia fim-a-fim. Evite logins sensíveis.
    </div>

    <main class="flex-grow flex flex-col items-center justify-center p-6">
        <div class="max-w-2xl w-full bg-gray-800 rounded-xl shadow-2xl p-8 border border-gray-700">
            <h1 class="text-3xl font-bold mb-6 text-center text-blue-400">Stealth Proxy</h1>
            
            <form id="proxyForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1">Destino (URL)</label>
                    <input type="url" id="urlInput" placeholder="https://google.com" required
                        class="w-full bg-gray-700 text-white px-4 py-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1">Provedor DoH</label>
                    <select id="dohSelect" class="w-full bg-gray-700 text-white px-4 py-3 rounded-lg focus:outline-none">
                        <option value="cloudflare">Cloudflare</option>
                        <option value="google">Google</option>
                        <option value="quad9">Quad9</option>
                    </select>
                </div>

                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition">
                    Acessar via Proxy
                </button>
            </form>

            <div class="mt-8 grid grid-cols-2 gap-3">
                <button onclick="quickNav('https://reddit.com')" class="bg-gray-700 p-2 rounded text-sm hover:bg-gray-600">Reddit</button>
                <button onclick="quickNav('https://wikipedia.org')" class="bg-gray-700 p-2 rounded text-sm hover:bg-gray-600">Wikipedia</button>
            </div>
        </div>
    </main>

    <script>
        function quickNav(url) {
            const doh = document.getElementById('dohSelect').value;
            window.location.href = `/api/proxy?doh=${doh}&url=${encodeURIComponent(url)}`;
        }

        // Usamos este listener para garantir que o formulário foi encontrado
        window.onload = function() {
            const form = document.getElementById('proxyForm');
            if (form) {
                form.addEventListener('submit', function(e) {
                    e.preventDefault();
                    const url = document.getElementById('urlInput').value;
                    const doh = document.getElementById('dohSelect').value;
                    window.location.href = `/api/proxy?doh=${doh}&url=${encodeURIComponent(url)}`;
                });
            } else {
                console.error("Erro: Formulário 'proxyForm' não encontrado no HTML.");
            }
        };
    </script>
</body>
